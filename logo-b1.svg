<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <rect x="20" y="12" width="80" height="80" rx="16" fill="none" stroke="url(#b1)" stroke-width="2.5"/>
  <!-- N -->
  <text x="38" y="65" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#e0e0e0" letter-spacing="-1">N</text>
  <!-- Candle inside box, overlapping N -->
  <rect x="72" y="28" width="6" height="35" rx="1.5" fill="#00c853" opacity="0.85"/>
  <line x1="75" y1="28" x2="75" y2="24" stroke="#00c853" stroke-width="1.5"/>
  <line x1="75" y1="63" x2="75" y2="67" stroke="#00c853" stroke-width="1.5"/>
  <rect x="82" y="38" width="5" height="25" rx="1.5" fill="url(#b1)" opacity="0.5"/>
  <line x1="84" y1="38" x2="84" y2="35" stroke="url(#b1)" stroke-width="1.5"/>
  <!-- Trend line -->
  <polyline points="65,58 75,42 87,50" fill="none" stroke="#00bcd4" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9.5" fill="#6b7280" letter-spacing="3" font-weight="400">Built on Evidence</text>
</svg>
