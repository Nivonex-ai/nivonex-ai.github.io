<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="b8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Larger box, wider -->
  <rect x="15" y="12" width="90" height="80" rx="16" fill="none" stroke="url(#b8)" stroke-width="2.5"/>
  <!-- N in center of box -->
  <text x="36" y="65" font-family="'Inter', 'Segoe UI', sans-serif" font-size="55" font-weight="800" fill="#e0e0e0" letter-spacing="-1">N</text>
  <!-- Mathematical overlay: + − × -->
  <text x="75" y="40" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#00bcd4" opacity="0.5" font-weight="300">∑</text>
  <text x="72" y="72" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#1a73e8" opacity="0.4" font-weight="300">α</text>
  <text x="28" y="38" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#00c853" opacity="0.4" font-weight="300">β</text>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9.5" fill="#6b7280" letter-spacing="3" font-weight="400">Measure. Model. Execute.</text>
</svg>
