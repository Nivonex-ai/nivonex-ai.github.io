<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Three N's forming an ascending chart -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e1)" stroke-width="2"/>
  <!-- N1 (small, low) -->
  <text x="28" y="74" font-family="'Inter','Segoe UI',sans-serif" font-size="22" font-weight="800" fill="url(#e1)" opacity="0.45">N</text>
  <!-- N2 (medium, middle) -->
  <text x="48" y="64" font-family="'Inter','Segoe UI',sans-serif" font-size="28" font-weight="800" fill="url(#e1)" opacity="0.7">N</text>
  <!-- N3 (large, high) -->
  <text x="70" y="52" font-family="'Inter','Segoe UI',sans-serif" font-size="34" font-weight="800" fill="url(#e1)">N</text>
  <!-- Connecting trend line -->
  <polyline points="38,72 58,62 87,48" fill="none" stroke="#00c853" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="87" cy="48" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Research  ·  Validation  ·  Automation</text>
</svg>
