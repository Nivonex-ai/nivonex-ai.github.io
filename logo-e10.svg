<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <filter id="e10g">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Box -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e10)" stroke-width="2"/>
  <!-- N with neon tube effect (multiple offset strokes) -->
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="url(#e10)" stroke-width="6" opacity="0.15" letter-spacing="-1" filter="url(#e10g)">N</text>
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="url(#e10)" stroke-width="4" opacity="0.3" letter-spacing="-1">N</text>
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="url(#e10)" stroke-width="2" opacity="0.6" letter-spacing="-1">N</text>
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="url(#e10)" letter-spacing="-1">N</text>
  <!-- Inner glow -->
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" letter-spacing="-1">N</text>
  <!-- Candlestick overlay -->
  <rect x="74" y="35" width="4" height="24" rx="1" fill="#0d1117" opacity="0.4"/>
  <rect x="81" y="25" width="5" height="34" rx="1" fill="#0d1117" opacity="0.55"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">First, Verify</text>
</svg>
