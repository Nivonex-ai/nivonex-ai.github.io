<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <filter id="e2sh">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Box -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e2)" stroke-width="2"/>
  <!-- N with 3D shadow -->
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="url(#e2)" letter-spacing="-1" filter="url(#e2sh)">N</text>
  <!-- Second N as shadow layer -->
  <text x="34" y="68" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="url(#e2)" stroke-width="1" opacity="0.3" letter-spacing="-1">N</text>
  <!-- Green dot -->
  <circle cx="90" cy="22" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Built on Evidence</text>
</svg>
