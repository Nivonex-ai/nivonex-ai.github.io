<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Box -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e4)" stroke-width="2"/>
  <!-- Three N's as candlestick bars -->
  <text x="25" y="72" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="800" fill="url(#e4)" opacity="0.5" letter-spacing="-1">N</text>
  <line x1="32" y1="70" x2="32" y2="76" stroke="#1a73e8" stroke-width="2"/>
  
  <text x="48" y="58" font-family="'Inter','Segoe UI',sans-serif" font-size="36" font-weight="800" fill="#00c853" opacity="0.75" letter-spacing="-1">N</text>
  <line x1="57" y1="54" x2="57" y2="62" stroke="#00c853" stroke-width="2"/>
  
  <text x="74" y="48" font-family="'Inter','Segoe UI',sans-serif" font-size="40" font-weight="800" fill="url(#e4)" letter-spacing="-1">N</text>
  <line x1="85" y1="44" x2="85" y2="52" stroke="url(#e4)" stroke-width="2"/>
  
  <!-- Trend line connecting them -->
  <polyline points="30,68 52,54 80,44" fill="none" stroke="#00c853" stroke-width="1.5" stroke-linecap="round"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Systematic Trading</text>
</svg>
