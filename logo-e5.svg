<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- No box - just N as the main element -->
  <!-- N with large gradient fill -->
  <text x="28" y="82" font-family="'Inter','Segoe UI',sans-serif" font-size="72" font-weight="800" fill="url(#e5)" letter-spacing="-1">N</text>
  <!-- Cut-out candle inside the N -->
  <rect x="58" y="40" width="6" height="28" rx="2" fill="#0d1117" opacity="0.7"/>
  <rect x="68" y="30" width="7" height="38" rx="2" fill="#0d1117" opacity="0.85"/>
  <rect x="79" y="38" width="6" height="30" rx="2" fill="#0d1117" opacity="0.7"/>
  <!-- Wicks -->
  <line x1="71" y1="30" x2="71" y2="26" stroke="#0d1117" stroke-width="2" opacity="0.85"/>
  <!-- Trend line -->
  <polyline points="50,70 62,48 75,55 90,38" fill="none" stroke="#0d1117" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="90" cy="38" r="3" fill="#0d1117" opacity="0.6"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Data  ·  Systems  ·  Results</text>
