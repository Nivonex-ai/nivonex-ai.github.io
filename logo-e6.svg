<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e6a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="e6b" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="e6g">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e6a)" stroke-width="2"/>
  <!-- N split: left half blue, right half cyan -->
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="url(#e6a)" letter-spacing="-1">N</text>
  <!-- Glow overlay -->
  <text x="36" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="url(#e6b)" stroke-width="2" opacity="0.5" letter-spacing="-1" filter="url(#e6g)">N</text>
  <!-- Accent line through the middle -->
  <line x1="50" y1="22" x2="70" y2="82" stroke="white" stroke-width="0.8" opacity="0.08"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Measure. Model. Execute.</text>
</svg>
