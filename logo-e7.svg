<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Box -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e7)" stroke-width="2"/>
  <!-- Three N's in an ascending column (like a bar chart) -->
  <rect x="26" y="52" width="68" height="6" rx="2" fill="url(#e7)" opacity="0.15"/>
  <rect x="26" y="38" width="68" height="6" rx="2" fill="url(#e7)" opacity="0.25"/>
  <rect x="26" y="24" width="68" height="6" rx="2" fill="url(#e7)" opacity="0.4"/>
  
  <text x="28" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="800" fill="url(#e7)" opacity="0.4">N</text>
  <text x="42" y="52" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="800" fill="url(#e7)" opacity="0.6">N</text>
  <text x="56" y="38" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="800" fill="url(#e7)" opacity="0.8">N</text>
  <text x="70" y="24" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="800" fill="url(#e7)">N</text>
  
  <!-- Trend arrow up -->
  <polyline points="35,56 50,40 68,28 84,20" fill="none" stroke="#00c853" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="84,16 78,24 90,22" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Research First</text>
</svg>
