<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="e8a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="e8b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Box -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#e8a)" stroke-width="2"/>
  <!-- N with 3D extrusion to the right and down -->
  <!-- Shadow/extrusion layer -->
  <text x="38" y="66" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#1a73e8" opacity="0.25" letter-spacing="-1">N</text>
  <text x="40" y="68" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#2563eb" opacity="0.15" letter-spacing="-1">N</text>
  <!-- Face -->
  <text x="36" y="64" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="url(#e8b)" letter-spacing="-1">N</text>
  <!-- Highlight -->
  <text x="36" y="64" font-family="'Inter','Segoe UI',sans-serif" font-size="52" font-weight="800" fill="none" stroke="white" stroke-width="0.8" opacity="0.12" letter-spacing="-1">N</text>
  <!-- Trend line crossing the N -->
  <polyline points="24,70 55,50 85,62" fill="none" stroke="#00c853" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="55" cy="50" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter','Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Precision in Execution</text>
</svg>
