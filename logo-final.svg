<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square + double border (из 17) -->
  <rect x="18" y="10" width="84" height="84" rx="16" fill="none" stroke="url(#fg)" stroke-width="2"/>
  <rect x="24" y="16" width="72" height="72" rx="13" fill="none" stroke="url(#fg)" stroke-width="1" opacity="0.3"/>
  <!-- N with gradient fill (из 6) -->
  <text x="36" y="66" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="url(#fg)" letter-spacing="-1">N</text>
  <!-- Upward arrow through N (из 1) -->
  <polyline points="58,58 72,38 84,48" fill="none" stroke="#00c853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="72,33 67,44 78,43" fill="#00c853"/>
  <!-- Candle inside box, right side (из 11) -->
  <rect x="76" y="40" width="4" height="26" rx="1" fill="url(#fg)" opacity="0.5"/>
  <rect x="83" y="30" width="5" height="36" rx="1" fill="#00c853" opacity="0.85"/>
  <line x1="85.5" y1="30" x2="85.5" y2="26" stroke="#00c853" stroke-width="1.5"/>
  <!-- Green signal dot (из 6) -->
  <circle cx="90" cy="22" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Research  ·  Validation  ·  Automation</text>
</svg>
