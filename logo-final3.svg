<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="fg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Double border circle (из 17 style) -->
  <circle cx="55" cy="55" r="40" fill="none" stroke="url(#fg3)" stroke-width="2"/>
  <circle cx="55" cy="55" r="34" fill="none" stroke="url(#fg3)" stroke-width="0.8" opacity="0.3"/>
  <!-- N gradient (из 6) -->
  <text x="38" y="64" font-family="'Inter', 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#fg3)" letter-spacing="-1">N</text>
  <!-- Arrow through N (из 1) -->
  <polyline points="55,50 65,35 78,42" fill="none" stroke="#00c853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="65,30 60,41 71,40" fill="#00c853"/>
  <!-- Small candle (из 11) -->
  <rect x="48" y="32" width="3" height="14" rx="1" fill="#00c853" opacity="0.5"/>
  <!-- Green dot -->
  <circle cx="82" cy="30" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="110" y="50" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="112" y="73" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Evidence Before Capital</text>
