<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Tilted square -->
  <rect x="15" y="8" width="88" height="88" rx="14" fill="none" stroke="url(#r1)" stroke-width="2.5" transform="rotate(-6, 59, 52)"/>
  <!-- N slightly tilted opposite -->
  <text x="32" y="65" font-family="'Inter', 'Segoe UI', sans-serif" font-size="55" font-weight="800" fill="#e0e0e0" letter-spacing="-1" transform="rotate(3, 55, 52)">N</text>
  <!-- Candle inside -->
  <rect x="73" y="30" width="7" height="40" rx="2" fill="url(#r1)" opacity="0.8"/>
  <line x1="76.5" y1="30" x2="76.5" y2="25" stroke="url(#r1)" stroke-width="1.5"/>
  <rect x="84" y="38" width="5" height="32" rx="1.5" fill="#00c853" opacity="0.7"/>
  <line x1="86.5" y1="38" x2="86.5" y2="34" stroke="#00c853" stroke-width="1.5"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Built on Evidence</text>
</svg>
