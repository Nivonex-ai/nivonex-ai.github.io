<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="r2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="r2g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Glass background -->
  <rect x="15" y="8" width="88" height="88" rx="14" fill="url(#r2g)"/>
  <rect x="15" y="8" width="88" height="88" rx="14" fill="none" stroke="url(#r2)" stroke-width="2" opacity="0.6"/>
  <!-- Chart line background -->
  <polyline points="18,75 35,55 50,65 68,40 85,50 100,35" fill="none" stroke="url(#r2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- N foreground (translucent) -->
  <text x="33" y="66" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#e0e0e0" opacity="0.95" letter-spacing="-1">N</text>
  <!-- Gloss/shine line -->
  <line x1="20" y1="20" x2="40" y2="88" stroke="white" stroke-width="1" opacity="0.06"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Research  ·  Validation  ·  Automation</text>
</svg>
