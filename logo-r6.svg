<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="r6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Box -->
  <rect x="15" y="8" width="88" height="88" rx="14" fill="none" stroke="url(#r6)" stroke-width="2"/>
  <!-- N -->
  <text x="33" y="66" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#e0e0e0" letter-spacing="-1">N</text>
  <!-- Precision reticle - thin, elegant -->
  <circle cx="75" cy="55" r="20" fill="none" stroke="url(#r6)" stroke-width="1.2" opacity="0.6"/>
  <line x1="55" y1="55" x2="95" y2="55" stroke="url(#r6)" stroke-width="0.8" opacity="0.35"/>
  <line x1="75" y1="35" x2="75" y2="75" stroke="url(#r6)" stroke-width="0.8" opacity="0.35"/>
  <!-- Tick marks on reticle -->
  <line x1="60" y1="55" x2="63" y2="55" stroke="#00c853" stroke-width="1.5"/>
  <line x1="87" y1="55" x2="90" y2="55" stroke="#00c853" stroke-width="1.5"/>
  <circle cx="75" cy="55" r="3" fill="none" stroke="#00c853" stroke-width="1.2"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">Precision in Execution</text>
</svg>
