<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="r9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <filter id="r9g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Box with glow -->
  <rect x="15" y="8" width="88" height="88" rx="14" fill="url(#r9)" opacity="0.06"/>
  <rect x="15" y="8" width="88" height="88" rx="14" fill="none" stroke="url(#r9)" stroke-width="2.5"/>
  <!-- N -->
  <text x="33" y="66" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="url(#r9)" letter-spacing="-1">N</text>
  <!-- Candle cluster (3 candles) -->
  <rect x="70" y="42" width="5" height="30" rx="1.5" fill="url(#r9)" opacity="0.5"/>
  <rect x="79" y="30" width="6" height="42" rx="1.5" fill="#00c853" opacity="0.85"/>
  <line x1="82" y1="30" x2="82" y2="26" stroke="#00c853" stroke-width="1.5"/>
  <rect x="89" y="38" width="5" height="34" rx="1.5" fill="url(#r9)" opacity="0.5"/>
  <!-- Trend line -->
  <polyline points="63,60 75,38 82,44 94,35" fill="none" stroke="#00c853" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- NIVONEX -->
  <text x="120" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <text x="122" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" font-weight="400">First, Verify</text>
</svg>
