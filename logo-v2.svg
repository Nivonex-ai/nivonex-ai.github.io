<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- N with heartbeat/pulse line -->
  <text x="45" y="68" font-family="'Inter', 'Segoe UI', sans-serif" font-size="60" font-weight="800" fill="#e0e0e0" letter-spacing="-1">N</text>
  <!-- Pulse line through N -->
  <polyline points="0,75 20,75 28,55 36,85 44,65 52,75 70,75" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small signal dot at peak -->
  <circle cx="36" cy="85" r="3" fill="#00c853"/>
  <!-- NIVONEX -->
  <text x="115" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#e0e0e0" letter-spacing="4">NIVONEX</text>
  <!-- Tagline -->
  <text x="117" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9.5" fill="#6b7280" letter-spacing="3" font-weight="400">Built on Evidence</text>
</svg>
