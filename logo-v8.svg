  <defs>
    <linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- N made of 3 bars (chart bars forming N) -->
  <!-- Left bar -->
  <rect x="30" y="22" width="10" height="48" rx="2" fill="url(#g8)"/>
  <!-- Diagonal bar -->
  <rect x="48" y="18" width="10" height="80" rx="2" fill="url(#g8)" opacity="0.8" transform="rotate(-15, 53, 58)"/>
  <!-- Right bar -->
  <rect x="72" y="22" width="10" height="48" rx="2" fill="url(#g8)" opacity="0.6"/>
  <!-- Upward trend overlay -->
