<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#0d1117" stroke="url(#nGrad)" stroke-width="3"/>

  <!-- Candlestick 1 (left) -->
  <rect x="70" y="150" width="12" height="80" rx="2" fill="url(#barGrad)"/>
  <rect x="74" y="148" width="4" height="84" rx="1" fill="#1a73e8"/>

  <!-- Candlestick 2 (center-left, bullish) -->
  <rect x="110" y="120" width="14" height="110" rx="2" fill="url(#barGrad)"/>
  <rect x="115" y="118" width="4" height="114" rx="1" fill="#00c853"/>

  <!-- Candlestick 3 (center, small) -->
  <rect x="150" y="170" width="14" height="60" rx="2" fill="url(#barGrad)"/>
  <rect x="155" y="168" width="4" height="64" rx="1" fill="#1a73e8"/>

  <!-- Candlestick 4 (right, bullish high) -->
  <rect x="190" y="90" width="16" height="140" rx="2" fill="url(#barGrad)"/>
  <rect x="196" y="88" width="4" height="144" rx="1" fill="#00c853"/>

  <!-- Candlestick 5 (far right) -->
  <rect x="230" y="140" width="14" height="90" rx="2" fill="url(#barGrad)"/>
  <rect x="235" y="138" width="4" height="94" rx="1" fill="#1a73e8"/>

  <!-- Trend line going up -->
  <polyline points="76,200 118,185 158,195 200,160 238,175"
    fill="none" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.9"/>

  <!-- Signal dots on trend line -->
  <circle cx="76" cy="200" r="4" fill="#00bcd4"/>
  <circle cx="200" cy="160" r="5" fill="#00c853"/>

  <!-- "N" letter overlay (large, subtle) -->
  <text x="200" y="310" text-anchor="middle"
    font-family="'Segoe UI', -apple-system, sans-serif"
    font-size="100" font-weight="700" fill="none"
    stroke="url(#nGrad)" stroke-width="2" letter-spacing="2">
    N
  </text>

  <!-- Small pulse/radar arc -->
  <path d="M 60 240 Q 130 220 200 240 Q 270 260 340 240"
    fill="none" stroke="url(#nGrad)" stroke-width="1.5"
    stroke-dasharray="4 4" opacity="0.4"/>
</svg>
