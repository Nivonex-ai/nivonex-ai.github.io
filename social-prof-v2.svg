<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="h1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="250" cy="200" r="195"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="200" r="198" fill="url(#bg)"/>
  <circle cx="250" cy="200" r="196" fill="url(#bg)"/>

  <!-- Warm glow -->
  <circle cx="250" cy="150" r="110" fill="#ffd700" opacity="0.05"/>

  <!-- ===== PROFESSOR ===== -->

  <!-- Body / lab coat -->
  <rect x="175" y="165" width="150" height="120" rx="25" fill="#1e1e32"/>

  <!-- Shoulders -->
  <path d="M175,260 C160,275 145,295 140,320 L360,320 C355,295 340,275 325,260" fill="#1e1e32"/>

  <!-- Shirt collar -->
  <path d="M238,260 L250,285 L262,260" fill="#2d2d44" stroke="#444" stroke-width="1"/>

  <!-- Lab coat overlap -->
  <path d="M175,260 L175,330 L210,330 L210,275 L250,295 L290,275 L290,330 L325,330 L325,260" fill="#252540" opacity="0.8"/>
  <line x1="250" y1="295" x2="250" y2="330" stroke="#444" stroke-width="1"/>
  <circle cx="250" cy="310" r="3" fill="#555"/>
  <circle cx="250" cy="325" r="3" fill="#555"/>

  <!-- Head -->
  <ellipse cx="250" cy="155" rx="55" ry="48" fill="#e8c9a0"/>

  <!-- Messy hair -->
  <path d="M200,145 C195,105 215,90 230,95 C240,80 255,75 270,80 C285,70 300,85 305,100 C312,105 308,130 300,140" fill="#3d3d5c"/>
  <path d="M205,135 C200,110 218,95 235,100 C245,85 260,80 275,85 C290,75 298,90 300,105" fill="#4a4a6e" opacity="0.5"/>
  <!-- Stray hairs -->
  <path d="M200,138 C192,115 195,95 210,100" fill="none" stroke="#3d3d5c" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M298,108 C306,98 308,88 300,84" fill="none" stroke="#3d3d5c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M210,140 C220,135 232,136 238,140" fill="none" stroke="#5c4a3a" stroke-width="2" stroke-linecap="round"/>
  <path d="M262,140 C268,136 280,135 290,140" fill="none" stroke="#5c4a3a" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes (tired but warm) -->
  <!-- Left eye -->
  <ellipse cx="230" cy="152" rx="11" ry="6" fill="#fff"/>
  <ellipse cx="230" cy="152" rx="7" ry="4.5" fill="#4a6fa5"/>
  <ellipse cx="230" cy="152" rx="4" ry="4" fill="#111"/>
  <!-- Right eye -->
  <ellipse cx="270" cy="152" rx="11" ry="6" fill="#fff"/>
  <ellipse cx="270" cy="152" rx="7" ry="4.5" fill="#4a6fa5"/>
  <ellipse cx="270" cy="152" rx="4" ry="4" fill="#111"/>
  <circle cx="232" cy="150" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="272" cy="150" r="2" fill="#fff" opacity="0.8"/>

  <!-- Eye bags -->
  <path d="M216,160 C224,166 236,166 240,160" fill="none" stroke="#8b6f5e" stroke-width="1.5" opacity="0.4"/>
  <path d="M260,160 C264,166 276,166 284,160" fill="none" stroke="#8b6f5e" stroke-width="1.5" opacity="0.4"/>

  <!-- Glasses -->
  <circle cx="230" cy="152" r="16" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <circle cx="270" cy="152" r="16" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <path d="M246,152 C248,149 252,149 254,152" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>

  <!-- Nose -->
  <path d="M248,164 C249,168 251,170 253,168" fill="none" stroke="#c4a882" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Warm smile -->
  <path d="M238,176 C244,182 256,182 262,176" fill="none" stroke="#8b6f5e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M250,174 L250,178" stroke="#8b6f5e" stroke-width="1" stroke-linecap="round"/>

  <!-- Stubble -->
  <circle cx="235" cy="182" r="1.5" fill="#8b7355" opacity="0.2"/>
  <circle cx="245" cy="185" r="1.5" fill="#8b7355" opacity="0.2"/>
  <circle cx="255" cy="185" r="1.5" fill="#8b7355" opacity="0.2"/>
  <circle cx="265" cy="182" r="1.5" fill="#8b7355" opacity="0.2"/>

  <!-- ===== ARM HUGGING LOGO (right side) ===== -->
  <path d="M325,240 C340,250 345,270 335,290" fill="none" stroke="#e8c9a0" stroke-width="14" stroke-linecap="round"/>
  <!-- Hand on top of logo -->
  <ellipse cx="330" cy="280" rx="12" ry="8" fill="#e8c9a0" stroke="#d4b896" stroke-width="1" transform="rotate(-10,330,280)"/>

  <!-- ===== COFFEE MUG (left hand) ===== -->
  <rect x="155" y="255" width="24" height="32" rx="5" fill="#5c4a3a"/>
  <rect x="158" y="258" width="18" height="26" rx="4" fill="#6b5546"/>
  <path d="M179,263 C190,263 192,272 190,278 C188,283 179,283 179,280" fill="none" stroke="#5c4a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <rect x="158" y="258" width="18" height="4" rx="2" fill="#3d2b1a"/>
  <!-- Steam -->
  <path d="M162,253 C160,246 164,241 162,236" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M168,253 C166,246 170,241 168,236" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M174,253 C172,246 176,241 174,236" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- ===== FULL LOGO ===== -->

  <!-- Gradient square with N -->
  <rect x="95" y="270" width="52" height="52" rx="10" fill="url(#h1)"/>
  <text x="110" y="306" font-family="Inter,sans-serif" font-size="33" font-weight="800" fill="#fff" letter-spacing="-1">N</text>
  <rect x="95" y="270" width="52" height="52" rx="10" fill="none" stroke="url(#h1)" stroke-width="2.5"/>

  <!-- Pulse line -->
  <polyline points="89,296 95,296 99,288 103,298 107,292 111,296 129,296" fill="none" stroke="#0d1117" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- NIVONEX text -->
  <text x="155" y="302" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#e0e0e0" letter-spacing="4">NIVONEX<tspan fill="url(#h1)" letter-spacing="0">.</tspan></text>

  <!-- Tagline -->
  <text x="155" y="318" font-family="Inter,sans-serif" font-size="12" font-weight="400" fill="#8b949e" letter-spacing="1">EVIDENCE BEFORE CAPITAL</text>
</svg>
