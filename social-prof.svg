<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="h1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="198" fill="#0d1117"/>
  <circle cx="200" cy="200" r="196" fill="#161b22"/>

  <!-- Professor body (behind the logo) -->
  <rect x="120" y="180" width="160" height="140" rx="30" fill="#1a1a2e"/>

  <!-- Shoulders -->
  <path d="M120,280 C100,290 80,310 70,360 L330,360 C320,310 300,290 280,280" fill="#1a1a2e"/>

  <!-- Collar / shirt -->
  <path d="M190,280 L200,310 L210,280" fill="#2d2d44" stroke="#444" stroke-width="1"/>

  <!-- Lab coat / cardigan (professor vibe) -->
  <path d="M120,280 L120,370 L160,370 L160,300 L200,320 L240,300 L240,370 L280,370 L280,280" fill="#2a2a3d" opacity="0.8"/>
  <!-- Coat buttons -->
  <circle cx="200" cy="330" r="3" fill="#555"/>
  <circle cx="200" cy="350" r="3" fill="#555"/>

  <!-- Professor head -->
  <ellipse cx="200" cy="155" rx="65" ry="55" fill="#e8c9a0"/>

  <!-- Messy hair -->
  <path d="M140,145 C135,100 155,85 175,90 C185,75 200,70 215,75 C230,65 250,80 260,95 C270,100 265,130 260,140" fill="#3d3d5c" stroke="none"/>
  <path d="M145,135 C140,105 155,90 170,95 C180,80 195,75 210,80 C225,70 245,85 255,100" fill="#4a4a6e" stroke="none" opacity="0.6"/>
  <!-- Stray hairs -->
  <path d="M145,135 C135,110 140,90 155,95" fill="none" stroke="#3d3d5c" stroke-width="3" stroke-linecap="round"/>
  <path d="M255,105 C265,95 268,85 260,80" fill="none" stroke="#3d3d5c" stroke-width="3" stroke-linecap="round"/>
  <path d="M180,80 C175,65 180,60 190,65" fill="none" stroke="#3d3d5c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyebrows (tired, slightly furrowed) -->
  <path d="M155,140 C165,135 178,136 185,140" fill="none" stroke="#5c4a3a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M245,140 C235,135 222,136 215,140" fill="none" stroke="#5c4a3a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes (tired - half closed, with bags) -->
  <!-- Left eye -->
  <ellipse cx="178" cy="153" rx="12" ry="6" fill="#fff"/>
  <ellipse cx="178" cy="153" rx="8" ry="5" fill="#4a6fa5"/>
  <ellipse cx="178" cy="153" rx="4" ry="4" fill="#111"/>
  <!-- Right eye -->
  <ellipse cx="222" cy="153" rx="12" ry="6" fill="#fff"/>
  <ellipse cx="222" cy="153" rx="8" ry="5" fill="#4a6fa5"/>
  <ellipse cx="222" cy="153" rx="4" ry="4" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="180" cy="151" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="224" cy="151" r="2" fill="#fff" opacity="0.8"/>

  <!-- Dark circles / bags under eyes -->
  <path d="M162,162 C170,168 186,168 190,162" fill="none" stroke="#8b6f5e" stroke-width="2" opacity="0.5"/>
  <path d="M210,162 C214,168 230,168 238,162" fill="none" stroke="#8b6f5e" stroke-width="2" opacity="0.5"/>

  <!-- Glasses (round, wireframe) -->
  <circle cx="178" cy="153" r="18" fill="none" stroke="#888" stroke-width="2.5"/>
  <circle cx="222" cy="153" r="18" fill="none" stroke="#888" stroke-width="2.5"/>
  <!-- Bridge -->
  <path d="M196,153 C198,150 202,150 204,153" fill="none" stroke="#888" stroke-width="2.5"/>
  <!-- Glasses reflection -->
  <path d="M164,145 C168,142 172,142 174,145" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <path d="M208,145 C212,142 216,142 218,145" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>

  <!-- Nose -->
  <path d="M197,165 C198,170 200,172 203,170 C205,168 203,165" fill="none" stroke="#c4a882" stroke-width="2" stroke-linecap="round"/>

  <!-- Stubble beard -->
  <circle cx="180" cy="185" r="1" fill="#8b7355" opacity="0.3"/>
  <circle cx="190" cy="188" r="1" fill="#8b7355" opacity="0.3"/>
  <circle cx="200" cy="190" r="1" fill="#8b7355" opacity="0.3"/>
  <circle cx="210" cy="188" r="1" fill="#8b7355" opacity="0.3"/>
  <circle cx="220" cy="185" r="1" fill="#8b7355" opacity="0.3"/>

  <!-- Mouth (slight tired smile) -->
  <path d="M190,180 C195,185 205,185 210,180" fill="none" stroke="#8b6f5e" stroke-width="2" stroke-linecap="round"/>

  <!-- Nivonex gradient square with N -->
  <rect x="130" y="195" width="140" height="140" rx="28" fill="url(#h1)"/>
  <text x="168" y="290" font-family="Inter,sans-serif" font-size="96" font-weight="900" fill="#fff" letter-spacing="-3">N</text>
  <rect x="130" y="195" width="140" height="140" rx="28" fill="none" stroke="url(#h1)" stroke-width="4"/>

  <!-- Professor's arm hugging the logo (from right side) -->
  <!-- Right arm coming around -->
  <path d="M280,240 C300,250 310,270 300,290 C290,310 270,300 260,290" fill="#e8c9a0" stroke="#d4b896" stroke-width="2"/>
  <!-- Hand / fingers on the square -->
  <ellipse cx="278" cy="265" rx="12" ry="8" fill="#e8c9a0" stroke="#d4b896" stroke-width="1.5" transform="rotate(-15,278,265)"/>
  <path d="M280,255 C285,252 290,254 290,258" fill="none" stroke="#d4b896" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M276,260 C282,257 287,259 287,263" fill="none" stroke="#d4b896" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Coffee mug in left hand -->
  <rect x="100" y="255" width="20" height="28" rx="4" fill="#5c4a3a"/>
  <path d="M120,262 C130,262 132,270 130,275 C128,280 120,280 120,278" fill="none" stroke="#5c4a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- Coffee steam -->
  <path d="M105,252 C103,245 107,240 105,235" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M112,252 C110,245 114,240 112,235" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Mug handle -->
  <path d="M96,263 C90,263 88,270 90,275" fill="none" stroke="#5c4a3a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small NIVONEX text below -->
  <text x="200" y="380" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#8b949e" letter-spacing="5" text-anchor="middle" opacity="0.6">NIVONEX</text>
</svg>
